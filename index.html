<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EpanD Marketplace - Pemberitahuan Perpindahan Domain</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 560px;
            width: 100%;
        }

        /* Glassmorphism Card - Minimal */
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 40px 32px;
        }

        /* Header minimal */
        .chip {
            display: inline-block;
            background: rgba(0, 0, 0, 0.04);
            border-radius: 100px;
            padding: 6px 14px;
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: 500;
            color: #1d1c1f;
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        h1 {
            font-size: 40px;
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1.1;
            margin-bottom: 24px;
            color: #1d1c1f;
        }

        /* Domain box - sederhana */
        .domain-box {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            padding: 28px;
            margin: 24px 0;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .old-domain {
            color: #8e8e93;
            text-decoration: line-through;
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 8px;
            opacity: 0.7;
        }

        .arrow-icon {
            color: #007AFF;
            font-size: 20px;
            margin: 4px 0 8px;
        }

        .new-domain {
            font-size: 28px;
            font-weight: 600;
            color: #007AFF;
            word-break: break-all;
            background: white;
            padding: 12px 20px;
            border-radius: 16px;
            display: inline-block;
            border: 1px solid rgba(0, 122, 255, 0.2);
        }

        /* Redirect info - minimal */
        .redirect-info {
            background: rgba(0, 122, 255, 0.08);
            border-radius: 60px;
            padding: 12px 20px;
            margin: 28px 0 20px;
            color: #1d1c1f;
            font-weight: 500;
            font-size: 15px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(0, 122, 255, 0.15);
        }

        .countdown {
            background: #1d1c1f;
            color: white;
            padding: 4px 10px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 14px;
        }

        /* Primary button - clean */
        .primary-button {
            display: inline-block;
            background: #007AFF;
            color: white;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 17px;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.2);
            width: 100%;
            text-align: center;
            margin: 16px 0 8px;
        }

        .primary-button:hover {
            background: #0051d5;
            transform: scale(1.01);
        }

        /* Footer - dengan WhatsApp link */
        .footer {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .whatsapp-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(37, 211, 102, 0.1);
            color: #075e54;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 60px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid rgba(37, 211, 102, 0.2);
            transition: all 0.2s ease;
        }

        .whatsapp-link:hover {
            background: rgba(37, 211, 102, 0.15);
            transform: scale(1.02);
        }

        .whatsapp-link svg {
            width: 18px;
            height: 18px;
            fill: #25D366;
        }

        .footer-note {
            font-size: 13px;
            color: #8e8e93;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .footer-note span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .glass-card {
                padding: 32px 24px;
                border-radius: 32px;
            }
            
            h1 {
                font-size: 32px;
            }
            
            .new-domain {
                font-size: 22px;
                padding: 10px 16px;
            }
            
            .footer-note {
                gap: 12px;
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <!-- Header minimal -->
            <div class="chip">
                ⚡ Pemberitahuan Resmi
            </div>

            <!-- Title singkat -->
            <h1>Kami pindah<br>ke domain baru</h1>

            <!-- Domain info - padat dan jelas -->
            <div class="domain-box">
                <div class="old-domain">public-marketplace.vercel.app</div>
                <div class="arrow-icon">↓</div>
                <div class="new-domain">mymarket.edgeone.app</div>
            </div>

            <!-- Redirect timer -->
            <div class="redirect-info">
                <span>🔄 Mengalihkan dalam</span>
                <span class="countdown" id="countdown">15</span>
                <span>detik</span>
            </div>

            <!-- CTA Button - jelas -->
            <a href="https://mymarket.edgeone.app" class="primary-button">
                Kunjungi Domain Baru
            </a>

            <!-- Footer dengan WhatsApp link -->
            <div class="footer">
                <a href="https://whatsapp.com/channel/0029VbCPCq92v1Il3mzHgY1E" class="whatsapp-link" target="_blank">
                    <svg viewBox="0 0 24 24">
                        <path d="M19.077 4.928C17.191 3.041 14.683 2 12.006 2 6.798 2 2.537 6.192 2.526 11.393c-.004 1.746.456 3.457 1.328 4.998L2.4 21.6l5.273-1.398c1.499.82 3.192 1.257 4.948 1.26h.004c5.191 0 9.443-4.185 9.454-9.385.005-2.508-.977-4.869-2.862-6.757zM12.052 19.79h-.003c-1.531-.001-3.035-.413-4.351-1.19l-.312-.186-3.129.83.836-3.05-.203-.324a8.216 8.216 0 0 1-1.26-4.48c.008-4.542 3.705-8.24 8.258-8.24 2.205 0 4.279.86 5.838 2.422a8.182 8.182 0 0 1 2.414 5.852c-.009 4.545-3.706 8.246-8.25 8.246v.01z"/>
                    </svg>
                    Channel WhatsApp Info Update
                </a>

                <!-- Footer notes sangat ringkas -->
                <div class="footer-note">
                    <span>🔒 Data tetap sama</span>
                    <span>✨ Performa lebih baik</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Countdown sederhana 15 detik
        let seconds = 15;
        const countdownElement = document.getElementById('countdown');
        
        const interval = setInterval(() => {
            seconds--;
            countdownElement.textContent = seconds;
            
            if (seconds <= 0) {
                clearInterval(interval);
                window.location.href = "https://mymarket.edgeone.app";
            }
        }, 1000);

        // Hentikan countdown jika klik link
        document.querySelector('.primary-button').addEventListener('click', () => clearInterval(interval));
        document.querySelector('.whatsapp-link').addEventListener('click', () => clearInterval(interval));
    </script>
</body>
</html>
